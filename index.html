<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 健康教练</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        /* 顶部数字人区域 */
        .avatar-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .avatar-name {
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .avatar-status {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .avatar-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 20px;
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }

        .message.assistant .bubble {
            background: white;
            color: #334155;
            border-radius: 20px 20px 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .bubble {
            display: inline-block;
            max-width: 85%;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bubble b {
            color: #667eea;
        }

        /* 输入区域 */
        .input-section {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* 响应式 */
        @media (max-width: 420px) {
            .app {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 数字人区域 -->
        <div class="avatar-section">
            <div class="avatar">🤖</div>
            <div class="avatar-name">小健康</div>
            <div class="avatar-status">在线 - 随时为你服务</div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="bubble">
                    你好！我是 <b>小健康</b>，你的 AI 健康教练 🌿<br><br>
                    我可以帮你制定：<br>
                    • <b>营养计划</b> - 早餐/午餐/晚餐建议<br>
                    • <b>运动计划</b> - 有氧/力量训练安排<br>
                    • <b>健康建议</b> - 减肥/增肌/保持健康<br><br>
                    你可以问我：<br>
                    • "我想减肥，请给我建议"<br>
                    • "推荐一个健身计划"<br>
                    • "今天早餐吃什么？"<br><br>
                    开始聊天吧！💪
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-section">
            <input type="text" class="message-input" id="messageInput" placeholder="输入你的问题..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // AI 响应库
        const responses = {
            nutrition: `🍽️ <b>每日营养计划</b><br><br>
<b>🌅 早餐 (7:00-8:00)</b><br>
• 全麦面包 2片<br>
• 水煮蛋 1个<br>
• 低脂牛奶 200ml<br>
• 水果 1份（苹果/香蕉）<br><br>
<b>☀️ 午餐 (12:00-13:00)</b><br>
• 杂粮饭 1碗<br>
• 瘦肉类 150g（鸡胸/鱼）<br>
• 时令蔬菜 200g<br>
• 汤品 1碗<br><br>
<b>🌙 晚餐 (18:00-19:00)</b><br>
• 杂粮粥/红薯 1份<br>
• 豆制品 100g<br>
• 蔬菜沙拉 1份<br>
• 饭后散步 15分钟<br><br>
💡 <b>提示</b>：少油少盐，定时定量，多喝水！`,

            exercise: `🏃 <b>每周运动计划</b><br><br>
<b>📅 周一 - 有氧训练</b><br>
• 跑步/快走 30分钟<br>
• 拉伸 10分钟<br><br>
<b>📅 周二 - 力量训练</b><br>
• 深蹲 3组 × 15次<br>
• 俯卧撑 3组 × 12次<br>
• 卷腹 3组 × 15次<br><br>
<b>📅 周三 - 休息/轻度活动</b><br>
• 散步 20-30分钟<br>
• 瑜伽拉伸<br><br>
<b>📅 周四 - 综合训练</b><br>
• 跳跃类运动 15分钟<br>
• 核心训练 15分钟<br><br>
<b>📅 周五 - 有氧训练</b><br>
• 骑行/游泳 30分钟<br>
• 上肢力量 10分钟<br><br>
<b>📅 周六 - 户外运动</b><br>
• 骑行/登山/打球<br>
• 时间 40-60分钟<br><br>
<b>📅 周日 - 完全休息</b><br>
• 充分休息<br>
• 泡脚放松<br><br>
💡 <b>提示</b>：循序渐进，不要勉强！`,

            weightLoss: `🎯 <b>减脂建议</b><br><br>
<b>1. 饮食控制</b><br>
• 每日热量控制在 1500-1800 大卡<br>
• 减少高糖高油食物<br>
• 增加蛋白质摄入<br>
• 多吃高纤维蔬菜<br><br>
<b>2. 运动安排</b><br>
• 每周至少 4-5 天运动<br>
• 有氧运动每周 3-4 次，30-45 分钟<br>
• 力量训练每周 2-3 次<br><br>
<b>3. 生活习惯</b><br>
• 保证睡眠 7-8 小时<br>
• 每天饮水 2000-2500ml<br>
• 每日步数 8000 步以上<br><br>
📊 <b>健康减脂速度</b><br>
每周减重 0.5-1kg 是最健康的节奏<br>
太快对身体不好！`,

            muscleGain: `💪 <b>增肌指南</b><br><br>
<b>1. 饮食策略</b><br>
• 每日热量超出 300-500 大卡<br>
• 蛋白质摄入 1.6-2.2g/公斤体重<br>
• 碳水化合物要充足<br>
• 训练后及时补充蛋白质<br><br>
<b>2. 训练重点</b><br>
• 力量训练为主<br>
• 大重量、低次数（6-12次）<br>
• 每个肌群每周训练 2-3 次<br>
• 复合动作优先（深蹲、硬拉、卧推）<br><br>
<b>3. 恢复很重要</b><br>
• 保证睡眠 8-9 小时<br>
• 肌肉需要 48-72 小时恢复<br>
• 避免过度训练<br><br>
💡 <b>增肌速度</b><br>
初学者每月可增肌 0.5-1kg<br>
坚持是关键！`,

            morning: `🍳 <b>早餐推荐</b><br><br>
<b>选项一：中式健康</b><br>
• 全麦馒头 1个<br>
• 水煮蛋 1个<br>
• 热牛奶/豆浆 1杯<br>
• 小黄瓜 1根<br><br>
<b>选项二：西式能量</b><br>
• 全麦面包 2片<br>
• 煎蛋 1个（少油）<br>
• 牛奶 1杯<br>
• 香蕉 1根<br><br>
<b>选项三：快速便捷</b><br>
• 燕麦片 40g<br>
• 热牛奶冲泡<br>
• 坚果一小把<br>
• 苹果 1个<br><br>
💡 <b>提示</b>：早餐要丰富，营养均衡，开启美好一天！`,

            greeting: `👋 <b>你好！有什么可以帮你的吗？</b><br><br>
我可以帮你：<br>
• 制定 <b>营养计划</b><br>
• 安排 <b>运动方案</b><br>
• 提供 <b>健康建议</b><br><br>
直接告诉我你的需求，比如：<br>
• "我想减肥"<br>
• "帮我做个健身计划"<br>
• "推荐一些运动"<br><br>
💪 让我们一起变得更健康！`,

            default: `🤔 <b>我理解你的问题</b><br><br>
作为 AI 健康教练，我主要提供以下服务：<br><br>
• <b>营养计划</b> - 告诉我你想吃什么，我给你建议<br>
• <b>运动方案</b> - 根据你的目标制定训练计划<br>
• <b>减脂增肌</b> - 科学的体重管理建议<br><br>
请告诉我你具体想了解哪方面？<br><br>
💬 你可以试试：<br>
• "我想减肥"<br>
• "推荐一个健身计划"<br>
• "早餐吃什么"`
        };

        // 获取 AI 响应
        function getAIResponse(message) {
            const lowerMessage = message.toLowerCase();

            if (lowerMessage.includes('营养') || lowerMessage.includes('吃') || lowerMessage.includes('早餐') || lowerMessage.includes('午餐') || lowerMessage.includes('晚餐')) {
                if (lowerMessage.includes('早餐')) return responses.morning;
                return responses.nutrition;
            }

            if (lowerMessage.includes('运动') || lowerMessage.includes('锻炼') || lowerMessage.includes('健身') || lowerMessage.includes('跑步') || lowerMessage.includes('训练') || lowerMessage.includes('计划')) {
                return responses.exercise;
            }

            if (lowerMessage.includes('减肥') || lowerMessage.includes('瘦身') || lowerMessage.includes('减重') || lowerMessage.includes('瘦')) {
                return responses.weightLoss;
            }

            if (lowerMessage.includes('增肌') || lowerMessage.includes('增重') || lowerMessage.includes('壮') || lowerMessage.includes('肌肉')) {
                return responses.muscleGain;
            }

            if (lowerMessage.includes('你好') || lowerMessage.includes('嗨') || lowerMessage.includes('hi') || lowerMessage.includes('hello') || lowerMessage.includes('在吗') || lowerMessage.includes('早上好')) {
                return responses.greeting;
            }

            return responses.default;
        }

        // 添加消息到聊天界面
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            messageDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 处理发送消息
        function handleSend() {
            const text = messageInput.value.trim();
            if (!text) return;

            // 添加用户消息
            addMessage(text, true);
            messageInput.value = '';

            // 数字人思考动画
            const avatar = document.querySelector('.avatar');
            avatar.textContent = '🤔';
            avatar.style.animation = 'none';

            // AI 回复
            setTimeout(() => {
                const response = getAIResponse(text);
                addMessage(response, false);
                avatar.textContent = '🤖';
                avatar.style.animation = 'pulse 3s ease-in-out infinite';
            }, 800);
        }

        // 事件监听
        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
