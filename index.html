<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 健康教练</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        /* 顶部数字人区域 */
        .avatar-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        #avatarCanvas {
            width: 100%;
            height: 260px;
            cursor: pointer;
        }

        .avatar-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.3));
            padding: 40px 20px 15px;
            text-align: center;
        }

        .avatar-name {
            color: white;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .avatar-status {
            color: rgba(255,255,255,0.95);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 500;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.6);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 16px;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(15px) scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }

        .message.user {
            text-align: right;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 24px 24px 6px 24px;
            box-shadow: 
                0 4px 15px rgba(102, 126, 234, 0.35),
                0 1px 3px rgba(102, 126, 234, 0.2);
        }

        .message.assistant .bubble {
            background: white;
            color: #1e293b;
            border-radius: 24px 24px 24px 6px;
            box-shadow: 
                0 4px 15px rgba(0,0,0,0.08),
                0 1px 3px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .bubble {
            display: inline-block;
            max-width: 85%;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            font-weight: 400;
        }

        .bubble b {
            color: #667eea;
            font-weight: 600;
        }

        /* 输入区域 */
        .input-section {
            padding: 16px 20px 20px;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.06);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 28px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .message-input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: 
                0 4px 12px rgba(102, 126, 234, 0.4),
                0 2px 4px rgba(102, 126, 234, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 
                0 6px 16px rgba(102, 126, 234, 0.5),
                0 3px 6px rgba(102, 126, 234, 0.35);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* 响应式 */
        @media (max-width: 420px) {
            .app {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
        }

        /* 滚动条美化 */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 数字人区域 -->
        <div class="avatar-section">
            <canvas id="avatarCanvas"></canvas>
            <div class="avatar-overlay">
                <div class="avatar-name">小健康</div>
                <div class="avatar-status">
                    <div class="status-dot"></div>
                    在线 - 随时为你服务
                </div>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="bubble">
                    你好！我是 <b>小健康</b>，你的 AI 健康教练 🌿<br><br>
                    我可以帮你制定：<br>
                    • <b>营养计划</b> - 早餐/午餐/晚餐建议<br>
                    • <b>运动计划</b> - 有氧/力量训练安排<br>
                    • <b>健康建议</b> - 减肥/增肌/保持健康<br><br>
                    你可以问我：<br>
                    • "我想减肥，请给我建议"<br>
                    • "推荐一个健身计划"<br>
                    • "今天早餐吃什么？"<br><br>
                    开始聊天吧！💪
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-section">
            <input type="text" class="message-input" id="messageInput" placeholder="输入你的问题..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        // Three.js 3D 数字人 - 更现代的版本
        const canvas = document.getElementById('avatarCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(canvas.offsetWidth, canvas.offsetHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, canvas.offsetWidth / canvas.offsetHeight, 0.1, 1000);
        camera.position.z = 5.5;

        const group = new THREE.Group();
        scene.add(group);

        // 头部 - 更精致的球体
        const headGeometry = new THREE.SphereGeometry(1, 64, 64);
        const headMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffdbac,
            metalness: 0.05,
            roughness: 0.4,
            clearcoat: 0.2,
            clearcoatRoughness: 0.1
        });
        const head = new THREE.Mesh(headGeometry, headMaterial);
        group.add(head);

        // 头发 - 更有层次感
        const hairGeometry = new THREE.SphereGeometry(1.05, 64, 64);
        const hairMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x2c1810,
            metalness: 0.1,
            roughness: 0.7
        });
        const hair = new THREE.Mesh(hairGeometry, hairMaterial);
        hair.position.y = 0.15;
        hair.scale.y = 1.1;
        group.add(hair);

        // 头发刘海
        const bangsGeometry = new THREE.TorusGeometry(0.7, 0.15, 16, 32, Math.PI);
        const bangs = new THREE.Mesh(bangsGeometry, hairMaterial);
        bangs.position.set(0, 0.5, 0.7);
        bangs.rotation.x = -0.5;
        bangs.rotation.z = Math.PI;
        group.add(bangs);

        // 眼睛 - 更真实的结构
        const eyeSocketGeometry = new THREE.SphereGeometry(0.2, 32, 32);
        const eyeSocketMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.1,
            clearcoat: 0.8
        });

        const leftEye = new THREE.Mesh(eyeSocketGeometry, eyeSocketMaterial);
        leftEye.position.set(-0.35, 0.15, 0.9);
        group.add(leftEye);

        const rightEye = new THREE.Mesh(eyeSocketGeometry, eyeSocketMaterial);
        rightEye.position.set(0.35, 0.15, 0.9);
        group.add(rightEye);

        // 眼珠
        const eyeballGeometry = new THREE.SphereGeometry(0.12, 32, 32);
        const eyeballMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x2c1810,
            metalness: 0.3,
            roughness: 0.2
        });

        const leftEyeball = new THREE.Mesh(eyeballGeometry, eyeballMaterial);
        leftEyeball.position.set(-0.35, 0.15, 1.02);
        group.add(leftEyeball);

        const rightEyeball = new THREE.Mesh(eyeballGeometry, eyeballMaterial);
        rightEyeball.position.set(0.35, 0.15, 1.02);
        group.add(rightEyeball);

        // 眨眼动画
        let blinkTimer = 0;
        let isBlinking = false;

        function updateBlink(deltaTime) {
            blinkTimer += deltaTime;
            if (blinkTimer > 4 && !isBlinking) {
                isBlinking = true;
                blinkTimer = 0;
            }

            if (isBlinking) {
                const blinkProgress = blinkTimer / 0.12;
                const eyeScale = Math.max(0.05, 1 - blinkProgress * 8);

                leftEye.scale.y = eyeScale;
                rightEye.scale.y = eyeScale;
                leftEyeball.scale.y = eyeScale;
                rightEyeball.scale.y = eyeScale;

                if (blinkProgress >= 1) {
                    isBlinking = false;
                    leftEye.scale.y = 1;
                    rightEye.scale.y = 1;
                    leftEyeball.scale.y = 1;
                    rightEyeball.scale.y = 1;
                    blinkTimer = 0;
                }
            }
        }

        // 眼睛高光 - 更闪耀
        const eyeShineGeometry = new THREE.SphereGeometry(0.04, 16, 16);
        const eyeShineMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0,
            roughness: 0,
            clearcoat: 1,
            emissive: 0xffffff,
            emissiveIntensity: 0.3
        });

        const leftEyeShine = new THREE.Mesh(eyeShineGeometry, eyeShineMaterial);
        leftEyeShine.position.set(-0.32, 0.18, 1.12);
        group.add(leftEyeShine);

        const rightEyeShine = new THREE.Mesh(eyeShineGeometry, eyeShineMaterial);
        rightEyeShine.position.set(0.38, 0.18, 1.12);
        group.add(rightEyeShine);

        // 眉毛
        const eyebrowGeometry = new THREE.BoxGeometry(0.4, 0.05, 0.05);
        const eyebrowMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x2c1810,
            metalness: 0.1,
            roughness: 0.6
        });

        const leftEyebrow = new THREE.Mesh(eyebrowGeometry, eyebrowMaterial);
        leftEyebrow.position.set(-0.35, 0.38, 0.95);
        leftEyebrow.rotation.z = 0.1;
        group.add(leftEyebrow);

        const rightEyebrow = new THREE.Mesh(eyebrowGeometry, eyebrowMaterial);
        rightEyebrow.position.set(0.35, 0.38, 0.95);
        rightEyebrow.rotation.z = -0.1;
        group.add(rightEyebrow);

        // 鼻子
        const noseGeometry = new THREE.ConeGeometry(0.12, 0.3, 16);
        const noseMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xf5c7a9,
            metalness: 0.05,
            roughness: 0.5
        });
        const nose = new THREE.Mesh(noseGeometry, noseMaterial);
        nose.position.set(0, -0.1, 1.1);
        nose.rotation.x = Math.PI;
        group.add(nose);

        // 嘴巴 - 更自然的微笑
        const mouthGeometry = new THREE.TorusGeometry(0.3, 0.06, 16, 32, Math.PI * 0.6);
        const mouthMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xcc6666,
            metalness: 0.1,
            roughness: 0.6
        });
        const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
        mouth.position.set(0, -0.35, 0.95);
        mouth.rotation.z = Math.PI;
        group.add(mouth);

        // 身体 - 现代化设计
        const bodyGeometry = new THREE.CylinderGeometry(0.7, 0.9, 1.6, 64);
        const bodyMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x667eea,
            metalness: 0.2,
            roughness: 0.5,
            clearcoat: 0.3
        });
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = -1.6;
        group.add(body);

        // 领子
        const collarGeometry = new THREE.TorusGeometry(0.7, 0.08, 16, 32, Math.PI * 0.5);
        const collarMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.4
        });
        const collar = new THREE.Mesh(collarGeometry, collarMaterial);
        collar.position.set(0, -0.8, 0.6);
        collar.rotation.x = -0.3;
        group.add(collar);

        // 手臂
        const armGeometry = new THREE.CylinderGeometry(0.18, 0.15, 1.3, 32);
        const armMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffdbac,
            metalness: 0.05,
            roughness: 0.5
        });

        const leftArm = new THREE.Mesh(armGeometry, armMaterial);
        leftArm.position.set(-0.95, -1.35, 0);
        leftArm.rotation.z = Math.PI / 4;
        group.add(leftArm);

        const rightArm = new THREE.Mesh(armGeometry, armMaterial);
        rightArm.position.set(0.95, -1.35, 0);
        rightArm.rotation.z = -Math.PI / 4;
        group.add(rightArm);

        // 手掌
        const handGeometry = new THREE.SphereGeometry(0.2, 32, 32);
        const leftHand = new THREE.Mesh(handGeometry, armMaterial);
        leftHand.position.set(-1.25, -1.85, 0.2);
        group.add(leftHand);

        const rightHand = new THREE.Mesh(handGeometry, armMaterial);
        rightHand.position.set(1.25, -1.85, 0.2);
        group.add(rightHand);

        // 光照系统 - 更专业
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x667eea, 0.4);
        fillLight.position.set(-5, 3, 3);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0x764ba2, 0.3);
        rimLight.position.set(0, -5, -5);
        scene.add(rimLight);

        const topLight = new THREE.PointLight(0xffffff, 0.5);
        topLight.position.set(0, 5, 2);
        scene.add(topLight);

        // 呼吸动画 - 更自然
        let breatheTime = 0;

        function updateBreathe(deltaTime) {
            breatheTime += deltaTime;
            const breatheScale = 1 + Math.sin(breatheTime * 1.8) * 0.015;
            group.scale.set(breatheScale, breatheScale, breatheScale);
        }

        // 点头动画
        let isNodding = false;
        let nodTime = 0;

        function startNodding() {
            isNodding = true;
            nodTime = 0;
        }

        function updateNod(deltaTime) {
            if (!isNodding) return;

            nodTime += deltaTime;
            const nodAngle = Math.sin(nodTime * 8) * 0.15;

            head.rotation.x = nodAngle;
            hair.rotation.x = nodAngle;
            bangs.rotation.x = -0.5 + nodAngle;
            nose.rotation.x = Math.PI + nodAngle * 0.5;
            mouth.rotation.z = Math.PI + nodAngle * 0.2;
            body.rotation.x = nodAngle * 0.2;

            if (nodTime > 1.2) {
                isNodding = false;
                head.rotation.x = 0;
                hair.rotation.x = 0;
                bangs.rotation.x = -0.5;
                nose.rotation.x = Math.PI;
                mouth.rotation.z = Math.PI;
                body.rotation.x = 0;
            }
        }

        // 动画循环
        let lastTime = 0;

        function animate(currentTime) {
            requestAnimationFrame(animate);

            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            updateBlink(deltaTime);
            updateBreathe(deltaTime);
            updateNod(deltaTime);

            // 微微晃动，增加真实感
            const sway = Math.sin(currentTime * 0.001) * 0.02;
            group.rotation.y = sway;

            renderer.render(scene, camera);
        }

        animate(0);

        // 响应窗口大小
        window.addEventListener('resize', () => {
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            renderer.setSize(width, height);
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        });

        // 聊天功能
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const responses = {
            nutrition: `🍽️ <b>每日营养计划</b><br><br>
<b>🌅 早餐 (7:00-8:00)</b><br>
• 全麦面包 2片<br>
• 水煮蛋 1个<br>
• 低脂牛奶 200ml<br>
• 水果 1份（苹果/香蕉）<br><br>
<b>☀️ 午餐 (12:00-13:00)</b><br>
• 杂粮饭 1碗<br>
• 瘦肉类 150g（鸡胸/鱼）<br>
• 时令蔬菜 200g<br>
• 汤品 1碗<br><br>
<b>🌙 晚餐 (18:00-19:00)</b><br>
• 杂粮粥/红薯 1份<br>
• 豆制品 100g<br>
• 蔬菜沙拉 1份<br>
• 饭后散步 15分钟<br><br>
💡 <b>提示</b>：少油少盐，定时定量，多喝水！`,

            exercise: `🏃 <b>每周运动计划</b><br><br>
<b>📅 周一 - 有氧训练</b><br>
• 跑步/快走 30分钟<br>
• 拉伸 10分钟<br><br>
<b>📅 周二 - 力量训练</b><br>
• 深蹲 3组 × 15次<br>
• 俯卧撑 3组 × 12次<br>
• 卷腹 3组 × 15次<br><br>
<b>📅 周三 - 休息/轻度活动</b><br>
• 散步 20-30分钟<br>
• 瑜伽拉伸<br><br>
<b>📅 周四 - 综合训练</b><br>
• 跳跃类运动 15分钟<br>
• 核心训练 15分钟<br><br>
<b>📅 周五 - 有氧训练</b><br>
• 骑行/游泳 30分钟<br>
• 上肢力量 10分钟<br><br>
<b>📅 周六 - 户外运动</b><br>
• 骑行/登山/打球<br>
• 时间 40-60分钟<br><br>
<b>📅 周日 - 完全休息</b><br>
• 充分休息<br>
• 泡脚放松<br><br>
💡 <b>提示</b>：循序渐进，不要勉强！`,

            weightLoss: `🎯 <b>减脂建议</b><br><br>
<b>1. 饮食控制</b><br>
• 每日热量控制在 1500-1800 大卡<br>
• 减少高糖高油食物<br>
• 增加蛋白质摄入<br>
• 多吃高纤维蔬菜<br><br>
<b>2. 运动安排</b><br>
• 每周至少 4-5 天运动<br>
• 有氧运动每周 3-4 次，30-45 分钟<br>
• 力量训练每周 2-3 次<br><br>
<b>3. 生活习惯</b><br>
• 保证睡眠 7-8 小时<br>
• 每天饮水 2000-2500ml<br>
• 每日步数 8000 步以上<br><br>
📊 <b>健康减脂速度</b><br>
每周减重 0.5-1kg 是最健康的节奏<br>
太快对身体不好！`,

            muscleGain: `💪 <b>增肌指南</b><br><br>
<b>1. 饮食策略</b><br>
• 每日热量超出 300-500 大卡<br>
• 蛋白质摄入 1.6-2.2g/公斤体重<br>
• 碳水化合物要充足<br>
• 训练后及时补充蛋白质<br><br>
<b>2. 训练重点</b><br>
• 力量训练为主<br>
• 大重量、低次数（6-12次）<br>
• 每个肌群每周训练 2-3 次<br>
• 复合动作优先（深蹲、硬拉、卧推）<br><br>
<b>3. 恢复很重要</b><br>
• 保证睡眠 8-9 小时<br>
• 肌肉需要 48-72 小时恢复<br>
• 避免过度训练<br><br>
💡 <b>增肌速度</b><br>

• <b>营养计划</b> - 告诉我你想吃什么，我给你建议<br>

        function getAIResponse(message) {
            const lowerMessage = message.toLowerCase();

            if (lowerMessage.includes('营养') || lowerMessage.includes('吃') || lowerMessage.includes('早餐') || lowerMessage.includes('午餐') || lowerMessage.includes('晚餐')) {
                if (lowerMessage.includes('早餐')) return responses.morning;
                return responses.nutrition;
            }

            if (lowerMessage.includes('运动') || lowerMessage.includes('锻炼') || lowerMessage.includes('健身') || lowerMessage.includes('跑步') || lowerMessage.includes('训练') || lowerMessage.includes('计划')) {
                return responses.exercise;
            }

            if (lowerMessage.includes('减肥') || lowerMessage.includes('瘦身') || lowerMessage.includes('减重') || lowerMessage.includes('瘦')) {
                return responses.weightLoss;
            }

            if (lowerMessage.includes('增肌') || lowerMessage.includes('增重') || lowerMessage.includes('壮') || lowerMessage.includes('肌肉')) {
                return responses.muscleGain;
            }

            if (lowerMessage.includes('你好') || lowerMessage.includes('嗨') || lowerMessage.includes('hi') || lowerMessage.includes('hello') || lowerMessage.includes('在吗') || lowerMessage.includes('早上好')) {
                return responses.greeting;
            }

            return responses.default;
        }

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            messageDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handleSend() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            messageInput.value = '';

            // 数字人点头动画（思考状态）
            startNodding();

            // AI 回复
            setTimeout(() => {
                const response = getAIResponse(text);
                addMessage(response, false);
            }, 800);
        }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
